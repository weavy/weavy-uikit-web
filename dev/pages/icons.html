<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, interactive-widget=resizes-content" />
  <link rel="modulepreload" href="/locales/sv-SE.ts" />
  <script type="module">
    import { iconMapping } from "/lib";

    // Load Font Awesome free (solid) as an ESM bundle from CDN
    import * as fa from "https://cdn.jsdelivr.net/npm/@fortawesome/free-solid-svg-icons@7.2.0/+esm";

    const getPath = (icon) => icon?.svgPathData || (icon?.icon && icon.icon[4]) || "";

    // Map existing app icon keys to Font Awesome icon exports where possible.
    const faNameMap = {
      alert: "faExclamationTriangle",
      "alert-circle": "faCircleExclamation",
      "alert-octagon": "faTriangleExclamation",
      bell: "faBell",
      "bell-off": "faBellSlash",
      check: "faCheck",
      "check-all": "faCheckDouble",
      close: "faTimes",
      attachment: "faPaperclip",
      download: "faDownload",
      upload: "faUpload",
      cloud: "faCloud",
      comment: "faComment",
      "comment-outline": "faComment",
      "content-save": "faFloppyDisk",
      delete: "faTrash",
      "delete-forever": "faTrash",
      "dots-vertical": "faEllipsisV",
      earth: "faGlobe",
      emoticon: "faFaceSmile",
      fullscreen: "faExpand",
      "fullscreen-exit": "faCompress",
      magnify: "faSearch",
      meeting: "faVideo",
      "menu-down": "faChevronDown",
      "menu-up": "faChevronUp",
      message: "faCommentDots",
      minus: "faMinus",
      next: "faArrowRight",
      previous: "faArrowLeft",
      pencil: "faPencil",
      pin: "faThumbtack",
      plus: "faPlus",
      poll: "faChartBar",
      read: "faCheck",
      restore: "faRotateRight",
      send: "faPaperPlane",
      sort: "faSort",
      star: "faStar",
      unstar: "faStar",
      "thumb-up": "faThumbsUp",
      video: "faVideo",
      wifi: "faWifi",
      "wifi-off": "faWifi",
    };

    const newMapping = {};
    Object.keys(faNameMap).forEach((key) => {
      const faIcon = fa[faNameMap[key]];
      const path = getPath(faIcon);
      const width = (faIcon?.icon && faIcon.icon[0]) || 512;
      const height = (faIcon?.icon && faIcon.icon[1]) || 512;
      // Create an IconDefinition for Weavy
      newMapping[key] = { width, height, path };
    });

    // Replace properties on the imported iconMapping object so existing consumers pick up the change
    Object.assign(iconMapping, newMapping);

    console.log("Overridden iconMapping with Font Awesome (solid):", iconMapping);

  </script>
  <script type="module" src="/utils/tanstack-dev-tools.ts"></script>
  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell,
        "Open Sans", "Helvetica Neue", sans-serif;
    }

    html.wy-dark {
      background-color: #000;
    }

    wy-feed {
      max-width: 600px;
      margin: 40px auto;
    }
  </style>
</head>

<body>
  <wy-context url="%WEAVY_URL%" tokenUrl="/api/token">
    <tanstack-dev-tools buttonposition="bottom-left" position="top"></tanstack-dev-tools>
    <div id="color-menu" style="display: flex; gap: 8px; justify-content: space-between;">
      <div>
        <button class="color" value="red">Red</button>
        <button class="color" value="green">Green</button>
        <button class="color" value="blue">Blue</button>
      </div>
      <div>
        <button class="mode" value="light">Light</button>
        <button class="mode" value="dark">Dark</button>
      </div>
    </div>
    <wy-feed uid="acme-posts"></wy-feed>
  </wy-context>
  <script>
    const feed = document.querySelector("wy-feed");
  </script>
  <script>
    document.getElementById("color-menu").addEventListener("click", (event) => {
      const target = event.target;
      if (target.className === "mode") {
        document.documentElement.className = target.value === "dark" ? "wy-dark" : "";
      } else if (target.className === "color") {
        document.documentElement.style.setProperty("--wy-theme-color", target.value);
      }
    });
  </script>
</body>

</html>
